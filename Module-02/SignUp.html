<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sign Up | Qumin</title>
</head>

<body>
   <nav>
      <ul>
         <li><a href="Home.html">Back to Home</a></li>
      </ul>
   </nav>
   <header>
      <h1>Sign Up to buy items</h1>
   </header>
   <br>
   <hr>
   <main>
      <form>
         <label for="firstName">First Name :</label><br>
         <input type="text" name="firstName" id="firstName">
         <br>

         <label for="lastName">Last Name :</label><br>
         <input type="text" name="lastName" id="lastName">
         <br>

         <label for="email">Email :</label><br>
         <input type="email" name="email" id="email">
         <br>

         <span>Gender : </span>
         <input type="radio" name="gender" id="male" value="male">
         <label for="male">Male</label>
         <input type="radio" name="gender" id="female" value="female">
         <label for="female">Female</label>
         <br>

         <label for="pass">Password :</label><br>
         <input type="password" name="pass" id="pass">
         <br>

         <label for="retypePass">Retype Password :</label><br>
         <input type="password" name="retypePass" id="retypePass">
         <br><br>
         <input type="submit" value="Sign Up">
      </form>
   </main>
   <br>
   <hr>
   <footer>
      <p>&copy; 2026 DevMohim. All rights reserved.</p>
   </footer>
</body>

</html>
