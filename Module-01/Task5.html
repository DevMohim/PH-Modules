<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Task-5 | Job Application System</title>
</head>

<body>
   <header>
      <h3>Job Application Form for Beginner</h3>
   </header>
   <hr>
   <main>
      <form action="">
         <section>
            <h2>Personal Info :</h2>
               <label for="firstName">First Name : </label><br>
               <input type="text" name="firstName" id="firstName" placeholder="Enter your first name">
               <br>
               <label for="lastName">Last Name :</label><br>
               <input type="text" name="lastName" id="lastName">
               <br>
               <label for="email">Email :</label><br>
               <input type="email" name="email" id="email">
               <br>
               <label for="present">Present Address :</label><br>
               <textarea name="present" id="present"></textarea>
               <br>
               <label for="permanent">Permanent Address :</label><br>
               <textarea name="permanent" id="permanent"></textarea>
               <br>
               <label for="DOB">Date of Birth :</label>
               <input type="date" name="DOB" id="DOB">
               <br>
               <span>Gender :</span>

               <input type="radio" name="gender" id="male" value="male">
               <label for="male">Male</label>

               <input type="radio" name="gender" id="female" value="female">
               <label for="female">Female</label>

               <input type="radio" name="gender" id="other" value="other">
               <label for="other">Other</label>

               <br>

               <label for="religion">Religion :</label>
               <select name="religion" id="religion">
                  <option value="none">Select one</option>
                  <option value="Muslim">Muslim</option>
                  <option value="Hindu">Hindu</option>
                  <option value="Buddha">Buddha</option>
                  <option value="Christian">Christian</option>
               </select>
               <br>
               <label for="maritalStatus">Marital Status :</label>
               <input type="radio" name="marital" id="married" value="Married">
               <label for="married">Married</label>

               <input type="radio" name="marital" id="unmarried" value="Unmarried">
               <label for="unmarried">Unmarried</label>

               <br>
               
               <label for="bloodGroup">Blood Group : </label>
               <select name="bloodGroup" id="bloodGroup">
                  <option value="none">select one</option>
                  <option value="A +">A +</option>
                  <option value="A -">A -</option>
                  <option value="B +">B +</option>
                  <option value="B -">B -</option>
                  <option value="O +">O +</option>
                  <option value="O -">O -</option>
                  <option value="AB +">AB +</option>
                  <option value="AB -">AB -</option>
               </select>
         </section>
         <br>
         <section>
            <h2>Education Qualification </h2>

            
               <label for="degreeName">Degree Name :</label>
               <select name="degreeName" id="degreeName">
                  <option value="none">Select one</option>
                  <option value="S.S.C">S.S.C</option>
                  <option value="H.S.C">H.S.C</option>
                  <option value="Honours">Honours</option>
                  <option value="Masters">Masters</option>
                  <option value="Diploma">Diploma</option>
                  <option value="Vocational">Vocational</option>
               </select>
               <br>
               <label for="subject">Field of Study :</label>
               <select name="subject" id="subject">
                  <option value="">Select one</option>
                  <option value="Science">Science</option>
                  <option value="Arts">Arts</option>
                  <option value="Commerce">Commerce</option>
                  <option value="C.S.E">C.S.E</option>
                  <option value="E.E.E">E.E.E</option>
                  <option value="Civil">Civil</option>
                  <option value="Physics">Physics</option>
                  <option value="Chemistry">Chemistry</option>
                  <option value="Mathematics">Mathematics</option>
                  <option value="Botany">Botany</option>
                  <option value="Zoology">Zoology</option>
                  <option value="Accounting">Accounting</option>
                  <option value="Finance and Banking">Finance and Banking</option>
                  <option value="Management">Management</option>
                  <option value="Economics">Economics</option>
                  <option value="Political Science">Political Science</option>
                  <option value="Geography and Environment">Geography and Environment</option>
                  <option value="Bangla">Bangla</option>
                  <option value="English">English</option>
               </select>
               <br>
               <label for="gpa">GPA :</label>
               <input type="number" name="gpa" id="gpa">
               <br>
               <label for="instituteName">Institution Name :</label>
               <input type="text" name="instituteName" id="instituteName">
               <br>
               <label for="startDate">Start Date :</label>
               <input type="date" name="startDate" id="startDate">
               <br>
               <label for="endDate">End Date :</label>
               <input type="date" name="endDate" id="endDate">
               <br>

         </section>
         <br>
         <section>
            <h2>Skills </h2>
               <label for="skills">Enter Your skills :</label>

               <input type="checkbox" name="skills" id="html" value="HTML">
               <label for="html">HTML</label>

               <input type="checkbox" name="skills" id="css" value="CSS">
               <label for="css">CSS</label>

               <input type="checkbox" name="skills" id="tailwindCss" value="Tailwind Css">
               <label for="tailwindCss">Tailwind Css</label>

               <input type="checkbox" name="skills" id="javascript" value="JavaScript">
               <label for="javascript">JavaScript</label>

               <input type="checkbox" name="skills" id="react" value="React">
               <label for="react">React</label>

               <input type="checkbox" name="TypeScript" id="typeScript" value="TypeScript">
               <label for="typeScript">TypeScript</label>

               <input type="checkbox" name="skills" id="express.js" value="Express.js">
               <label for="express.js">Express.js</label>
               
               <input type="checkbox" name="skills" id="mongoDB" value="MongoDB">
               <label for="mongoDB">MongoDB</label>

         </section>
         <br>
         <section>
            <h2>Link Your Portfolio</h2>
            
               <label for="plink">Your portfolio link :</label>
               <input type="url" name="plink" id="plink">
            
         </section>
         <br>
         <section>
            <h2>Upload Your Resume</h2>
               <label for="resume">Upload Resume</label>
               <input type="file" id="resume" name="resume">
         </section>
         <br><br>
         <input type="submit" value="Submit">
      </form>
   </main>
   <footer>
      <p>&copy All right reserved by Mohim - 2026</p>
   </footer>
</body>

</html>
